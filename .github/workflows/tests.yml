name: Ruby tests
on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main
  workflow_dispatch:
jobs:
  tests:
    env:
      ELASTICSEARCH_URL: http://localhost:9200
      RAILS_VERSIONS: ${{ matrix.rails }}
    strategy:
      fail-fast: false
      matrix:
        rails: ['6.1', '7.0', '7.1']
        ruby: ['3.1', '3.2', '3.3']
        elasticsearch: ['8.19.12', '9.3.2']
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Increase system limits
      run: |
        sudo swapoff -a
        sudo sysctl -w vm.swappiness=1
        sudo sysctl -w fs.file-max=262144
        sudo sysctl -w vm.max_map_count=262144
    - uses: elastic/elastic-github-actions/elasticsearch@master
      with:
        stack-version: ${{ matrix.elasticsearch }}
        security-enabled: false
    - uses: ruby/setup-ruby@v1
      with:
        ruby-version: ${{ matrix.ruby }}
    - name: Pin Elasticsearch Ruby client to match server major version
      run: |
        ES_MAJOR=$(echo "${{ matrix.elasticsearch }}" | cut -d. -f1)
        # For each Gemfile/gemfile, replace any existing gem 'elasticsearch' line
        # with the version matching the matrix server major version. If no such
        # line exists, append one. This ensures the Ruby client talks the same
        # protocol as the test server without creating duplicate declarations.
        find . \( -name "Gemfile" -o -name "*.gemfile" \) ! -name "*.lock" \
          ! -path "*/examples/*" | while read -r file; do
          if grep -q "gem 'elasticsearch'" "$file"; then
            sed -i "/gem 'elasticsearch'/c\\gem 'elasticsearch', '~> ${ES_MAJOR}'" "$file"
          else
            echo "gem 'elasticsearch', '~> ${ES_MAJOR}'" >> "$file"
          fi
        done
    - name: Bundle
      run: |
        sudo apt-get install libsqlite3-dev
        gem install bundler
        bundle install
        bundle exec rake bundle:clean
        bundle exec rake bundle:install
    - name: Test elasticsearch-rails
      run: cd elasticsearch-rails && bundle exec rake test:all
    - name: Test elasticsearch-persistence
      run: cd elasticsearch-persistence && bundle exec rake test:all
    - name: Test elasticsearch-model
      run: cd elasticsearch-model && bundle exec rake test:all
